<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        body {
            min-height: 100vh;
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 text-center mb-4">Регистрация</h1>

                    <form id="registrationForm" class="mb-3">
                        <div class="mb-3">
                            <label for="login" class="form-label">Логин (Почта)</label>
                            <input type="text"
                                   id="login"
                                   name="login"
                                   class="form-control"
                                   placeholder="Введите логин"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль</label>
                            <input type="password"
                                   id="password"
                                   name="password"
                                   class="form-control"
                                   placeholder="Введите пароль"
                                   required>
                        </div>

<!--                        <div class="mb-3">-->

<!--                        </div>-->

<!--                        </div>-->

                        <button type="submit" class="btn btn-primary w-100 mt-2">
                            Зарегистрироваться
                        </button>
                    </form>

                    <div class="text-center">
                        <span class="text-muted">Уже есть аккаунт?</span>
                        <a href="/login" class="btn btn-link p-0 align-baseline">
                            Перейти ко входу
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('registrationForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const formData = new FormData(this);
        const params = new URLSearchParams(formData);

        fetch('/registration', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: params
        })
            .then(response => {
                if (response.ok) {
                    alert('Регистрация успешна!');
                    window.location.href = '/';
                } else {
                    alert('Ошибка регистрации. Пожалуйста, попробуйте ещё раз.');
                }
            })
            .catch(error => {
                console.error('Ошибка:', error);
                alert('Произошла ошибка. Пожалуйста, попробуйте ещё раз.');
            });
    });
</script>

</body>
