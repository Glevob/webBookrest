<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование пользователя</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:insert="~{blocks/header :: header}"></div>

<main class="container py-4" style="padding-top: 4.5rem;">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h4 mb-0">Редактирование пользователя</h1>
                <a href="/admin/users" class="btn btn-outline-secondary btn-sm">
                    ← Ко всем пользователям
                </a>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <form th:action="@{'/admin/users/' + ${user.idUser}}"
                          method="post"
                          class="row g-3">

                        <div class="col-12">
                            <label class="form-label">ID</label>
                            <input type="text"
                                   class="form-control"
                                   th:value="${user.idUser}"
                                   readonly>
                        </div>

                        <div class="col-12">
                            <label for="login" class="form-label">Логин</label>
                            <input type="text"
                                   id="login"
                                   name="login"
                                   class="form-control"
                                   th:value="${user.login}"
                                   required>
                        </div>

                        <div class="col-12">
                            <label for="password" class="form-label">Новый пароль</label>
                            <input type="password"
                                   id="password"
                                   name="password"
                                   class="form-control"
                                   placeholder="Оставьте пустым, чтобы не менять">
                        </div>

                        <div class="col-12">
                            <label class="form-label" for="authority">Права доступа</label>
                            <select id="authority"
                                    name="authority"
                                    class="form-select">
                                <option th:each="auth : ${allAuthorities}"
                                        th:value="${auth.name()}"
                                        th:text="${auth.name()}"
                                        th:selected="${user.userRoles != null and #lists.contains(user.userRoles.![userAuthority], auth)}">
                                </option>
                            </select>
                        </div>





                        <div class="col-12 d-flex justify-content-end gap-2 pt-2">
                            <a href="/admin/users" class="btn btn-outline-secondary">
                                Отмена
                            </a>
                            <button type="submit" class="btn btn-success">
                                Сохранить
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

</body>
</html>
