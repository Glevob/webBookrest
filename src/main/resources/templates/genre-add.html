<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Добавление жанра</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div th:insert="~{blocks/header :: header}"></div>

<div style="padding-top: 60px;" class="container mt-5">
    <h1>Добавление жанра</h1>
    <form action="/genre/add" method="post">
        <input type="text" name="genreName" placeholder="Введите наименование жанра" class="form-control"><br>
        <button type="submit" class="btn btn-success">Добавить жанр</button>
    </form>
</div>

<div th:insert="~{blocks/footer :: footer}"></div>
</body>
</html>
