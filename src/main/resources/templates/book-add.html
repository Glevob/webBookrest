<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавление книги</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .page-wrapper {
            padding-top: 4.5rem;
            padding-bottom: 3rem;
        }

        .form-card {
            border-radius: 0.75rem;
            border: 1px solid #dee2e6;
        }
    </style>
</head>
<body>

<div th:insert="~{blocks/header :: header}"></div>

<main class="container page-wrapper">
    <div class="row mb-4">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <h1 class="h3 mb-0">Добавление книги</h1>
            <a href="/book" class="btn btn-outline-secondary btn-sm">
                ← Назад к списку
            </a>
        </div>
    </div>

    <div class="card form-card shadow-sm bg-white">
        <div class="card-body">
            <form action="/book/add" method="post" enctype="multipart/form-data" class="row g-3">

                <div class="col-12">
                    <label for="bookTitle" class="form-label">Название книги</label>
                    <input type="text"
                           id="bookTitle"
                           name="bookTitle"
                           class="form-control"
                           placeholder="Введите название книги"
                           required>
                </div>

                <div class="col-12 col-md-6">
                    <label for="descriptBook" class="form-label">Описание книги</label>
                    <input type="text"
                           id="descriptBook"
                           name="descriptBook"
                           class="form-control"
                           placeholder="Введите описание книги">
                </div>

                <div class="col-12 col-md-6">
                    <label for="datePublic" class="form-label">Дата публикации</label>
                    <input type="date"
                           id="datePublic"
                           name="datePublic"
                           class="form-control"
                           required>
                </div>

                <div class="col-12 col-md-6">
                    <label for="price" class="form-label">Цена за экземпляр</label>
                    <input type="number"
                           min="0"
                           id="price"
                           name="price"
                           class="form-control"
                           placeholder="Введите цену за экземпляр"
                           required>
                </div>

                <div class="col-12 col-md-6">
                    <label for="star" class="form-label">Оценка</label>
                    <select id="star"
                            name="star"
                            class="form-control"
                            required>
                        <option value="" disabled selected>Выберите оценку</option>
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </div>


                <div class="col-12 col-md-6">
                    <label for="cover" class="form-label">Обложка</label>
                    <input type="file"
                           id="cover"
                           name="cover"
                           class="form-control">
                </div>

                <div class="col-12 col-md-8">
                    <label for="genres" class="form-label">Жанр книги</label>
                    <select name="genreId"
                            id="genres"
                            class="form-select"
                            required>
                        <option value="" disabled selected>Выберите жанр</option>
                        <option th:each="genre : ${genres}"
                                th:value="${genre.idGenre}"
                                th:text="${genre.genreName}">
                        </option>
                    </select>
                </div>

                <div class="col-12 col-md-4 d-flex align-items-end">
                    <button type="button"
                            class="btn btn-outline-secondary w-100"
                            onclick="window.location.href='/genre/add'">
                        Добавить жанр
                    </button>
                </div>

                <div class="col-12 d-flex justify-content-end gap-2 mt-3">
                    <a href="/book" class="btn btn-outline-secondary">
                        Отмена
                    </a>
                    <button type="submit" class="btn btn-success">
                        Добавить книгу
                    </button>
                </div>

            </form>
        </div>
    </div>
</main>

<div th:insert="~{blocks/footer :: footer}"></div>

</body>
</html>
