<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление пользователями</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:insert="~{blocks/header :: header}"></div>

<main class="container py-4" style="padding-top: 4.5rem;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h4 mb-0">Пользователи</h1>
        <a href="/" class="btn btn-outline-secondary btn-sm">
            ← На главную
        </a>
    </div>

    <div th:if="${#lists.isEmpty(users)}" class="alert alert-info">
        Пользователи не найдены.
    </div>

    <div th:if="${!#lists.isEmpty(users)}" class="table-responsive">
        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Логин</th>
                <th>Права доступа</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.idUser}"></td>
                <td th:text="${user.login}"></td>
                <td>
                    <span th:each="role,iter : ${user.userRoles}">
                        <span class="badge bg-secondary"
                              th:text="${role.userAuthority}"></span>
                        <span th:if="${!iter.last}">&nbsp;</span>
                    </span>
                </td>
                <td class="text-end">
                    <a th:href="@{'/admin/users/' + ${user.idUser}}"
                       class="btn btn-sm btn-primary">
                        Редактировать
                    </a>

                    <form th:action="@{'/admin/users/' + ${user.idUser} + '/delete'}"
                          method="post"
                          style="display:inline;"
                          onsubmit="return confirm('Вы уверены, что хотите удалить пользователя?');">
                        <button type="submit" class="btn btn-sm btn-danger">
                            Удалить
                        </button>
                    </form>
                </td>

            </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
