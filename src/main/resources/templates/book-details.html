<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Книга</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .page-wrapper {
            padding-top: 4.5rem;
            padding-bottom: 3rem;
        }

        .book-card {
            border-radius: 0.75rem;
            border: 1px solid #dee2e6;
        }

        .book-meta label {
            font-weight: 600;
            color: #495057;
            min-width: 190px;
        }

        .book-meta p {
            margin-bottom: 0.35rem;
        }

        .book-cover {
            max-width: 320px;
            max-height: 480px;
            object-fit: cover;
        }

        @media (max-width: 767.98px) {
            .book-card {
                padding: 1.25rem;
            }
        }
    </style>
</head>
<body>

<div th:insert="~{blocks/header :: header}"></div>

<main class="container page-wrapper">
    <div class="row mb-4">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <h1 class="h3 mb-0">Информация о книге</h1>
            <a href="/authorsBooks" class="btn btn-outline-secondary btn-sm">
                ← Назад к списку
            </a>
        </div>
    </div>

    <div class="card book-card shadow-sm bg-white">
        <div class="card-body">
            <div class="row g-4 align-items-start">

                <!-- Текстовая информация -->
                <div class="col-12 col-lg-7">
                    <h2 class="h4 mb-3" th:text="${book.bookTitle}">Название книги</h2>

                    <div class="book-meta">
                        <p>
                            <label>Описание:</label>
                            <span th:text="${book.descriptBook}"></span>
                        </p>
                        <br>
                        <!-- Авторы книги -->
                        <p th:if="${bookAuthors != null and !#lists.isEmpty(bookAuthors)}">
                            <label>Авторы:</label>
                            <span th:each="link, iter : ${bookAuthors}">
            <span th:text="${link.author.authorSurname} + ' ' +
                           ${link.author.authorName} + ' ' +
                           ${link.author.authorMiddlename}"></span>
            <span th:if="${link.authorRole != null and link.authorRole != ''}">
                (<span th:text="${link.authorRole}"></span>)
            </span>
            <span th:if="${!iter.last}">; </span>
        </span>
                        </p>

                        <p th:if="${bookAuthors == null or #lists.isEmpty(bookAuthors)}">
                            <label>Авторы:</label>
                            <span class="text-muted">не указаны</span>
                        </p>
                        <p>
                            <label>Жанр:</label>
                            <span th:text="${book.genre.genreName}"></span>
                        </p>
                        <p>
                            <label>Дата публикации:</label>
                            <span th:text="${book.datePublic}"></span>
                        </p>
                        <p>
                            <label>Цена:</label>
                            <span th:text="${book.price}"></span>
                        </p>
                        <p>
                            <label>Оценка:</label>
                            <span th:text="${book.star}"></span>
                        </p>
                    </div>

                    <!-- Кнопки редактировать/удалить только для TECHNOLOGIST и FULL -->
                    <div class="mt-4 d-flex flex-wrap gap-2"
                         sec:authorize="hasAnyAuthority('TECHNOLOGIST','FULL')">
                        <a th:href="@{/book/{id}/edit(id=${book.idBook})}"
                           class="btn btn-primary">
                            Редактировать
                        </a>

                        <form th:action="@{/book/{id}/delete(id=${book.idBook})}"
                              method="post"
                              onsubmit="return confirm('Вы уверены, что хотите удалить эту книгу?');">
                            <button class="btn btn-danger" type="submit">
                                Удалить
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Обложка -->
                <div class="col-12 col-lg-5 text-center">
                    <div class="border rounded p-2 bg-light d-inline-block">
                        <img th:if="${book.cover != null}"
                             th:src="@{'/uploads/' + ${book.cover}}"
                             alt="Обложка книги"
                             class="img-fluid book-cover"
                             style="max-width: 300px; max-height: 300px;">
                        <div th:if="${book.cover == null}" class="text-muted small px-3 py-4">
                            Обложка не загружена
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

<div th:insert="~{blocks/footer :: footer}"></div>

</body>
</html>
