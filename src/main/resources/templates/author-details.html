<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Автор</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:insert="~{blocks/header :: header}"></div>

<main class="container py-4" style="padding-top: 4.5rem;">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h4 mb-0">Автор</h1>
                <a href="/author" class="btn btn-outline-secondary btn-sm">
                    ← Ко всем авторам
                </a>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3"
                        th:text="${author.authorSurname} + ' ' + ${author.authorName} + ' ' + ${author.authorMiddlename}">
                        ФИО автора
                    </h5>

                    <dl class="row mb-4">
                        <dt class="col-sm-4">Имя</dt>
                        <dd class="col-sm-8" th:text="${author.authorName}"></dd>

                        <dt class="col-sm-4">Фамилия</dt>
                        <dd class="col-sm-8" th:text="${author.authorSurname}"></dd>

                        <dt class="col-sm-4">Отчество</dt>
                        <dd class="col-sm-8" th:text="${author.authorMiddlename}"></dd>

                        <dt class="col-sm-4">Почта</dt>
                        <dd class="col-sm-8">
                            <a th:href="'mailto:' + ${author.authorEmail}"
                               th:text="${author.authorEmail}"></a>
                        </dd>
                    </dl>

                    <div class="mt-4 d-flex flex-wrap gap-2"
                         sec:authorize="hasAnyAuthority('TECHNOLOGIST','FULL')">
                        <a th:href="@{/author/{id}/edit(id=${author.idAuthor})}"
                           class="btn btn-primary">
                            Редактировать
                        </a>

                        <form th:action="@{/author/{id}/delete(id=${author.idAuthor})}"
                              method="post"
                              onsubmit="return confirm('Удалить этого автора?');">
                            <button class="btn btn-danger" type="submit">
                                Удалить
                            </button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>
</main>

<div th:insert="~{blocks/footer :: footer}"></div>
</body>
</html>
