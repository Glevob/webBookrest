<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавление автора</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div th:insert="~{blocks/header :: header}"></div>

<main class="container py-4" style="padding-top: 4.5rem;">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h4 mb-0">Добавление автора</h1>
                <a href="/author" class="btn btn-outline-secondary btn-sm">
                    ← Ко всем авторам
                </a>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <form th:action="@{/author/add}" th:object="${author}" method="post" class="row g-3">

                        <div class="col-12">
                            <label for="authorSurname" class="form-label">Фамилия</label>
                            <input type="text"
                                   id="authorSurname"
                                   th:field="*{authorSurname}"
                                   class="form-control"
                                   placeholder="Введите фамилию автора"
                                   required>
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('authorSurname')}"
                                 th:errors="*{authorSurname}"></div>
                        </div>

                        <div class="col-12">
                            <label for="authorName" class="form-label">Имя</label>
                            <input type="text"
                                   id="authorName"
                                   th:field="*{authorName}"
                                   class="form-control"
                                   placeholder="Введите имя автора"
                                   required>
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('authorName')}"
                                 th:errors="*{authorName}"></div>
                        </div>

                        <div class="col-12">
                            <label for="authorMiddlename" class="form-label">Отчество</label>
                            <input type="text"
                                   id="authorMiddlename"
                                   th:field="*{authorMiddlename}"
                                   class="form-control"
                                   placeholder="Введите отчество автора">
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('authorMiddlename')}"
                                 th:errors="*{authorMiddlename}"></div>
                        </div>

                        <div class="col-12">
                            <label for="authorEmail" class="form-label">Электронная почта</label>
                            <input type="email"
                                   id="authorEmail"
                                   th:field="*{authorEmail}"
                                   class="form-control"
                                   placeholder="Введите почту автора"
                                   required>
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('authorEmail')}"
                                 th:errors="*{authorEmail}"></div>
                        </div>

                        <div class="col-12 d-flex justify-content-end gap-2 pt-2">
                            <a href="/author" class="btn btn-outline-secondary">
                                Отмена
                            </a>
                            <button type="submit" class="btn btn-success">
                                Добавить автора
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<div th:insert="~{blocks/footer :: footer}"></div>
</body>
</html>
