<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Авторы</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:insert="~{blocks/header :: header}"></div>

<main class="container py-4" style="padding-top: 4.5rem;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Авторы</h1>

        <div sec:authorize="hasAnyAuthority('TECHNOLOGIST','FULL')">
            <a href="/author/add" class="btn btn-success">
                Добавить автора
            </a>
        </div>

    </div>

    <div th:if="${#lists.isEmpty(authors)}" class="alert alert-info">
        Пока что авторов нет. Добавьте первого автора.
    </div>

    <div class="row g-3" th:if="${!#lists.isEmpty(authors)}">
        <div class="col-12 col-md-6 col-lg-4" th:each="author : ${authors}">
            <div class="card shadow-sm h-100">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title mb-1">
                        <span th:text="${author.authorSurname} + ' ' + ${author.authorName} + ' ' + ${author.authorMiddlename}"></span>
                    </h5>
                    <p class="card-text text-muted mb-3">
                        <span th:text="'Почта: ' + ${author.authorEmail}"></span>
                    </p>

                    <div sec:authorize="hasAnyAuthority('TECHNOLOGIST','FULL')">
                        <div class="mt-auto">
                            <a th:href="@{'/author/' + ${author.idAuthor}}"
                               class="btn btn-outline-primary btn-sm">
                                Детальнее
                            </a>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</main>

<div th:insert="~{blocks/footer :: footer}"></div>

</body>
</html>
