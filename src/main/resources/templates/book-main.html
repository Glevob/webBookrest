<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Книги</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .page-header {
            padding-top: 4.5rem;
            padding-bottom: 1.5rem;
        }

        .book-card {
            border-radius: 0.5rem;
            border: 1px solid #dee2e6;
        }

        .book-card h3 {
            margin-bottom: 0.5rem;
        }

        @media print {
            body {
                background-color: #ffffff !important;
            }
            body * {
                visibility: hidden;
            }
            #print-content,
            #print-content * {
                visibility: visible;
            }
            #print-content {
                position: absolute;
                inset: 0;
                padding: 2rem;
            }
            .no-print {
                display: none !important;
            }
        }

        #print-content {
            display: none;
        }
    </style>
</head>
<body>

<div th:insert="~{blocks/header :: header}"></div>

<main class="container page-header">

    <div class="d-flex justify-content-between align-items-center mb-4 no-print">
        <h1 class="h2 mb-0">Книги</h1>

        <!-- Кнопка только для TECHNOLOGIST и FULL -->
        <div sec:authorize="hasAnyAuthority('TECHNOLOGIST','FULL')">
            <a href="/book/add" class="btn btn-outline-primary">
                Добавить книгу
            </a>
        </div>
    </div>

    <div class="row g-3 no-print">
        <div class="col-12 col-md-6 col-lg-4"
             th:each="book : ${books}">
            <div class="book-card bg-white p-3 h-100 shadow-sm">
                <h3 class="h5 text-dark mb-2" th:text="${book.bookTitle}"></h3>

                <p class="mb-1 text-muted">
                    <span class="fw-semibold">Цена:</span>
                    <span th:text="${book.price}"></span>
                </p>

                <p class="mb-3 text-muted" th:if="${book.genre != null}">
                    <span class="fw-semibold">Жанр:</span>
                    <span th:text="${book.genre.genreName}"></span>
                </p>

                <!-- Кнопка "Детальнее" доступна всем -->
                <a th:href="@{'/book/' + ${book.idBook}}"
                   class="btn btn-sm btn-outline-secondary">
                    Детальнее
                </a>

                <!-- Пример: если нужно добавить тут же кнопки редактирования/удаления
                <span sec:authorize="hasAnyRole('TECHNOLOGIST','ADMIN')">
                    <a th:href="@{'/book/' + ${book.idBook} + '/edit'}"
                       class="btn btn-sm btn-primary ms-2">
                        Редактировать
                    </a>
                    <form th:action="@{'/book/' + ${book.idBook} + '/delete'}"
                          method="post"
                          class="d-inline">
                        <button type="submit"
                                class="btn btn-sm btn-danger ms-1">
                            Удалить
                        </button>
                    </form>
                </span>
                -->
            </div>
        </div>
    </div>

</main>

</body>
</html>
