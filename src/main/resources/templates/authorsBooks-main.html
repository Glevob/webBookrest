<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Связки</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        @media print {
            body * {
                visibility: hidden;
            }
            #print-content, #print-content * {
                visibility: visible;
            }
            #print-content {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                padding: 1rem;
            }
        }

        #print-content {
            display: none;
        }

        .author-cell {
            max-width: 220px;
            word-wrap: break-word;
        }
    </style>
</head>
<body class="bg-light">
<div th:insert="~{blocks/header :: header}"></div>

<main class="container py-4" style="padding-top: 4.5rem;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h4 mb-0">Связки</h1>
        <a href="/authorsBooks/add" class="btn btn-success"
           sec:authorize="hasAnyAuthority('TECHNOLOGIST','FULL')">
            Добавить связку
        </a>
    </div>

    <div th:if="${#lists.isEmpty(booksWithAuthors)}" class="alert alert-info">
        Пока связок нет. Добавьте первую связку автора и книги.
    </div>

    <div class="row g-3" th:if="${!#lists.isEmpty(booksWithAuthors)}">
        <div class="col-12 col-md-6 col-lg-4"
             th:each="item : ${booksWithAuthors}">
            <div class="card shadow-sm h-100">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title mb-2"
                        th:text="${item.book.bookTitle}">
                        Название книги
                    </h5>

                    <p class="text-muted mb-2">
                        <span class="fw-semibold">Жанр:</span>
                        <span th:text="${item.book.genre.genreName}">Жанр</span>
                    </p>

                    <p class="card-text text-muted mb-3">
                        <span class="fw-semibold">Авторы:</span><br>
                        <span th:each="link, iter : ${item.authorLinks}">
                            <span th:text="${link.author.authorSurname} + ' ' +
                                           ${link.author.authorName} + ' ' +
                                           ${link.author.authorMiddlename}"></span>
                            <span th:if="${!iter.last}">;<br></span>
                        </span>
                    </p>

                    <div class="mt-auto">
                        <div class="d-flex flex-wrap gap-2 mb-2">
                            <a th:href="@{'/book/' + ${item.book.idBook}}"
                               class="btn btn-outline-primary btn-sm">
                                Детальнее о книге
                            </a>
                        </div>

                        <!-- Для TECHNOLOGIST и FULL: по кнопке на каждую связку -->
                        <div class="d-flex flex-column gap-1"
                             sec:authorize="hasAnyAuthority('TECHNOLOGIST','FULL')">
                            <div th:each="link : ${item.authorLinks}">
                                <a th:href="@{'/authorsBooks/' + ${link.authorsBooksId}}"
                                   class="btn btn-outline-secondary btn-sm w-100">
                                    Детальнее о связке
                                    (<span th:text="${link.author.authorSurname}"></span>)
                                </a>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

</main>

</body>
</html>
