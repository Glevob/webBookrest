<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавление связки</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div th:insert="~{blocks/header :: header}"></div>

<main class="container py-4" style="padding-top: 4.5rem;">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h4 mb-0">Добавление связки</h1>
                <a href="/authorsBooks" class="btn btn-outline-secondary btn-sm">
                    ← К списку связок
                </a>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <form action="/authorsBooks/add" method="post" class="row g-3">

                        <div class="col-12">
                            <label for="books" class="form-label">Книга</label>
                            <div class="input-group">
                                <select name="bookId"
                                        id="books"
                                        class="form-select"
                                        required>
                                    <option value="" disabled selected>Выберите книгу</option>
                                    <option th:each="book : ${books}"
                                            th:value="${book.idBook}"
                                            th:text="${book.bookTitle}">
                                    </option>
                                </select>
                                <button type="button"
                                        class="btn btn-outline-secondary"
                                        onclick="window.location.href='/book/add'">
                                    Добавить книгу
                                </button>
                            </div>
                        </div>

                        <div class="col-12">
                            <label for="authors" class="form-label">Автор</label>
                            <div class="input-group">
                                <select name="authorId"
                                        id="authors"
                                        class="form-select"
                                        required>
                                    <option value="" disabled selected>Выберите автора</option>
                                    <option th:each="author : ${authors}"
                                            th:value="${author.idAuthor}"
                                            th:text="${author.authorSurname} + ' ' + ${author.authorName} + ' ' + ${author.authorMiddlename}">
                                    </option>
                                </select>
                                <button type="button"
                                        class="btn btn-outline-secondary"
                                        onclick="window.location.href='/author/add'">
                                    Добавить автора
                                </button>
                            </div>
                        </div>

                        <div class="col-12">
                            <label for="authorRole" class="form-label">Роль в создании</label>
                            <textarea id="authorRole"
                                      name="authorRole"
                                      class="form-control"
                                      rows="3"
                                      placeholder="Введите роль в создании произведения"
                                      required></textarea>
                        </div>

                        <div class="col-12 d-flex justify-content-end gap-2 pt-2">
                            <a href="/authorsBooks" class="btn btn-outline-secondary">
                                Отмена
                            </a>
                            <button type="submit" class="btn btn-success">
                                Добавить связку
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<div th:insert="~{blocks/footer :: footer}"></div>
</body>
</html>
